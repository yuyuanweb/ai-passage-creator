# ========================================
# AI 爆款文章创作器 - Go 版 Docker Compose 配置
# ========================================
# 使用方法：
#   1. 复制 .env.example 为 .env 并填写 API Key
#   2. 运行: docker compose up -d --build
#   3. 访问: http://localhost
# ========================================

services:
  # ============ MySQL 数据库 ============
  mysql:
    image: mysql:8.0
    container_name: ai-passage-mysql-go
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ai_passage_creator}
      TZ: ${TZ:-Asia/Shanghai}
    # 默认不暴露端口到宿主机（更安全），如需外部访问可取消注释
    # ports:
    #   - "${MYSQL_PORT:-13306}:3306"
    expose:
      - "3306"
    volumes:
      - mysql-data:/var/lib/mysql
      # SQL 初始化脚本（按文件名字母顺序执行）
      - ../sql/create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
      - ../sql/update_quota.sql:/docker-entrypoint-initdb.d/02_update_quota.sql:ro
      - ../sql/add_phase_fields.sql:/docker-entrypoint-initdb.d/03_add_phase_fields.sql:ro
      - ../sql/add_article_style.sql:/docker-entrypoint-initdb.d/04_add_article_style.sql:ro
      - ../sql/add_vip_payment.sql:/docker-entrypoint-initdb.d/05_add_vip_payment.sql:ro
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --character-set-client-handshake=FALSE
      - --init-connect=SET NAMES utf8mb4
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=200
      - --innodb_buffer_pool_size=256M

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: ai-passage-redis-go
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    # 默认不暴露端口到宿主机（更安全），如需外部访问可取消注释
    # ports:
    #   - "${REDIS_PORT:-16379}:6379"
    expose:
      - "6379"
    volumes:
      - redis-data:/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:-redis123}

  # ============ Go 后端服务 ============
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ai-passage-creator-go:latest
    container_name: ai-passage-creator-go
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      # 数据库配置
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE:-ai_passage_creator}
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      # Redis 配置
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis123}
      # AI 配置（必需）
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY:?请在 .env 中设置 DASHSCOPE_API_KEY}
      # Pexels 配置（必需）
      PEXELS_API_KEY: ${PEXELS_API_KEY:?请在 .env 中设置 PEXELS_API_KEY}
      # Nano Banana 配置（可选）
      NANO_BANANA_API_KEY: ${NANO_BANANA_API_KEY:-}
      # Stripe 配置（可选）
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # 腾讯云 COS 配置（可选）
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID:-}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY:-}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION:-ap-beijing}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET:-}
    ports:
      - "${BACKEND_PORT:-8123}:8123"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8123/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # ============ 前端服务 ============
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - BUILDKIT_INLINE_CACHE=1
    image: ai-passage-frontend:latest
    container_name: ai-passage-frontend-go
    restart: unless-stopped
    environment:
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# ============ 网络配置 ============
networks:
  app-network:
    driver: bridge
    name: ai-passage-network-go

# ============ 数据卷配置 ============
volumes:
  mysql-data:
    name: ai-passage-mysql-data-go
  redis-data:
    name: ai-passage-redis-data-go
