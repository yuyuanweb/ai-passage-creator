# 生产环境配置
spring:
  # MySQL 数据库配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://your-production-host:3306/my_db
    username: your-username
    password: your-password
  # Redis 配置
  data:
    redis:
      host: your-redis-host
      port: 6379
      database: 0
      password: your-redis-password
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-dashscope-api-key}

# Pexels API 配置
pexels:
  api-key: ${PEXELS_API_KEY:your-pexels-api-key}

# 腾讯云 COS 配置
tencent:
  cos:
    secret-id: ${TENCENT_COS_SECRET_ID:your-secret-id}
    secret-key: ${TENCENT_COS_SECRET_KEY:your-secret-key}
    region: ${TENCENT_COS_REGION:ap-guangzhou}
    bucket: ${TENCENT_COS_BUCKET:your-bucket}